services:
  router:
    build:
      context: ..
      dockerfile: deploy/router.Dockerfile
    container_name: mesh-router
    restart: unless-stopped
    ports:
      - "${MESH_ROUTER_BIND_HOST:-0.0.0.0}:8780:8780"
    volumes:
      - router-data:/data
    environment:
      MESH_ROUTER_PORT: "8780"
      MESH_DB_PATH: /data/router.db
      MESH_BUFFER_PATH: /data/events-buffer.jsonl
      MESH_AUTH_TOKEN: ${MESH_AUTH_TOKEN:?Set MESH_AUTH_TOKEN}
      MESH_DEV_MODE: "0"
      MESH_DISPATCH_INTERVAL_S: "5"
      MESH_LONGPOLL_TIMEOUT_S: "25"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8780/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  matrix-bridge:
    build:
      context: ..
      dockerfile: deploy/router.Dockerfile
    container_name: mesh-matrix-bridge
    restart: unless-stopped
    depends_on:
      router:
        condition: service_healthy
    env_file:
      - ${MESH_MATRIX_BRIDGE_DOCKER_ENV_FILE:-./mesh-matrix-bridge.docker.env}
    volumes:
      - ${MESH_MATRIX_BRIDGE_CONFIG_DIR:-./config}:/app/config:ro
    environment:
      MESH_ROUTER_URL: "http://router:8780"
      MESH_AUTH_TOKEN: ${MESH_AUTH_TOKEN:?Set MESH_AUTH_TOKEN}
      MESH_MATRIX_ACCESS_TOKEN: ${MESH_MATRIX_ACCESS_TOKEN:?Set MESH_MATRIX_ACCESS_TOKEN}
    command: ["python", "/app/scripts/mesh-matrix-bridge.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 1
      start_period: 3s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  router-data:
