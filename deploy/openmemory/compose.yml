# OpenMemory — standalone deployment for muletto (192.168.1.100)
# Phase 21: Shared Memory Layer
#
# Prerequisites:
#   git clone --branch v1.2.3 --depth 1 \
#     https://github.com/CaviraOSS/OpenMemory.git openmemory-src
#
# Usage:
#   dotenvx run -f .env -- docker compose up -d --build
#   docker compose down
#
# Pinned to v1.2.3 (latest stable as of 2026-03-05).
# Upgrade: cd openmemory-src && git fetch && git checkout v1.X.Y && cd .. \
#           && docker compose up -d --build

services:
  openmemory:
    build:
      context: ./openmemory-src/backend
    container_name: openmemory
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - openmemory_data:/data
    environment:
      OM_PORT: "8080"
      OM_DB_PATH: /data/openmemory.db
      OM_MODE: production
      OM_API_KEY: ${OM_API_KEY:?Set OM_API_KEY for auth}
      # Embeddings: Ollama primary, synthetic fallback
      OM_EMBEDDINGS: ${OM_EMBEDDINGS:-ollama}
      OM_EMBEDDING_FALLBACK: ${OM_EMBEDDING_FALLBACK:-synthetic}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openmemory_data:
