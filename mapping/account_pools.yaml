version: 1
providers:
  claude:
    default_account: "claude-samuele"
    accounts:
      - "claude-samuele"
      - "claude-gptcoderassistant"
      - "claude-gptprojectmanager"
    notes: "Real isolated CCS account profiles created via `ccs auth create <profile>`. Mesh may switch across these profiles between tasks/sessions when one account reaches its limit."

  codex:
    default_account: "codex"
    accounts:
      - "codex"
    notes: "Provider-direct today. If you later use multiple Codex accounts, update this file only."

  gemini:
    default_account: "gemini"
    accounts:
      - "gemini"
    notes: "Provider-direct today. If you later use multiple Gemini accounts, update this file only."
