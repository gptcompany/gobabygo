name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**/*.md"
      - ".github/badges/coverage.json"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - ".github/badges/coverage.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]' pytest-cov

      - name: Validate imports
        run: python -m compileall src

      - name: Full test suite (Linux)
        if: runner.os == 'Linux'
        run: pytest -q --cov=src --cov-report=term --cov-report=xml --cov-report=json

      - name: Render coverage badge
        if: runner.os == 'Linux' && success()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          coverage = json.loads(Path("coverage.json").read_text(encoding="utf-8"))
          pct = int(round(coverage["totals"]["percent_covered"]))
          if pct >= 90:
              color = "brightgreen"
          elif pct >= 75:
              color = "green"
          elif pct >= 60:
              color = "yellowgreen"
          elif pct >= 45:
              color = "yellow"
          else:
              color = "red"

          badge = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{pct}%",
              "color": color,
          }
          Path(".github/badges").mkdir(parents=True, exist_ok=True)
          Path(".github/badges/coverage.json").write_text(
              json.dumps(badge, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(badge))
          PY

      - name: Commit coverage badge
        if: >-
          runner.os == 'Linux' &&
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          set -euo pipefail
          branch="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git diff --cached --quiet && exit 0
          git commit -m "ci: update coverage badge"
          git push origin "HEAD:${branch}"

      - name: Smoke suite (macOS)
        if: runner.os == 'macOS'
        run: |
          pytest -q \
            tests/smoke/test_e2e_live.py \
            tests/test_meshctl.py \
            tests/test_deploy_scripts.py \
            tests/test_monitoring_config.py

      - name: Upload coverage artifact
        if: runner.os == 'Linux' && success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7
