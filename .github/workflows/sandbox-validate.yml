name: Sandbox Validation

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version used for validation
        required: true
        type: string
        default: "3.11"

jobs:
  sandbox-validate:
    name: In-Process Smoke + Config Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Deployment and monitoring validation
        run: |
          pytest -q \
            tests/test_deploy_scripts.py \
            tests/test_monitoring_config.py

      - name: Live in-process smoke validation
        run: |
          pytest -q \
            tests/smoke/test_e2e_live.py \
            tests/test_meshctl.py \
            tests/test_result_capture.py
